name: Build and Deploy Quarto Book

on:
  push:
    branches: main
    paths:
      - "*.qmd"
      - "*.yml"
      - "*.yaml"
      - "*.css"
      - "*.scss"
      - "*.bib"
      - "custom-scripts.html"
      - "images/**"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quarto-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R dependencies
        run: Rscript -e 'install.packages("knitr", repos="https://cloud.r-project.org")'

      - name: Install TinyTeX
        run: quarto install tinytex --no-prompt

      - name: Render Quarto book
        run: quarto render

      - name: Render module slides
        run: |
          set -euo pipefail
          slides=(
            module0-slides.qmd
            module1-slides.qmd
            module2-slides.qmd
            module3-slides.qmd
            module4-slides.qmd
            module5-slides.qmd
            module6-slides.qmd
            module7-slides.qmd
          )

          for slide in "${slides[@]}"; do
            base="${slide%.qmd}"
            quarto render "$slide"
            test -f "${base}.html"
            test -d "${base}_files"
            rm -rf "_book/${base}.html" "_book/${base}_files"
            mv "${base}.html" _book/
            mv "${base}_files" _book/
          done

      - name: Verify slides are rendered and linked
        run: |
          set -euo pipefail
          for n in 0 1 2 3 4 5 6 7; do
            test -f "_book/module${n}-slides.html"
            test -d "_book/module${n}-slides_files"
            grep -q "href=\"module${n}-slides.html\"" _book/index.html
          done

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _book

name: Publish Quarto Book

on:
  push:
    branches: main
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install TinyTeX
        run: quarto install tinytex --no-prompt

      - name: Render Quarto book
        run: quarto render

      - name: Render module slides
        run: |
          set -e
          for slide in module0-slides.qmd module1-slides.qmd module2-slides.qmd module3-slides.qmd module4-slides.qmd module5-slides.qmd module6-slides.qmd module7-slides.qmd; do
            base="${slide%.qmd}"
            if ! quarto render "$slide"; then
              echo "quarto render returned a non-zero exit code for $slide; checking generated files before continuing"
            fi
            test -f "${base}.html"
            test -d "${base}_files"
            rm -rf "_book/${base}.html" "_book/${base}_files"
            mv "${base}.html" _book/
            mv "${base}_files" _book/
          done

      - name: Verify slides are rendered and linked
        run: |
          test -f _book/module0-slides.html
          test -f _book/module1-slides.html
          test -f _book/module2-slides.html
          test -f _book/module3-slides.html
          test -f _book/module4-slides.html
          test -f _book/module5-slides.html
          test -f _book/module6-slides.html
          test -f _book/module7-slides.html
          test -d _book/module0-slides_files
          test -d _book/module1-slides_files
          test -d _book/module2-slides_files
          test -d _book/module3-slides_files
          test -d _book/module4-slides_files
          test -d _book/module5-slides_files
          test -d _book/module6-slides_files
          test -d _book/module7-slides_files
          grep -q 'href="module0-slides.html"' _book/index.html
          grep -q 'href="module1-slides.html"' _book/index.html
          grep -q 'href="module2-slides.html"' _book/index.html
          grep -q 'href="module3-slides.html"' _book/index.html
          grep -q 'href="module4-slides.html"' _book/index.html
          grep -q 'href="module5-slides.html"' _book/index.html
          grep -q 'href="module6-slides.html"' _book/index.html
          grep -q 'href="module7-slides.html"' _book/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _book
          cname:  # Add your custom domain here if you have one, e.g., yoursite.com
